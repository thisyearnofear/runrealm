# Lefthook configuration for RunRealm monorepo
# https://github.com/evilmartians/lefthook

# Pre-commit hooks - run on staged files
pre-commit:
  parallel: true
  commands:
    # Prevent stale compiled .js files from being committed
    check-stale-js:
      run: |
        if git diff --cached --name-only | grep -q "^src/components/.*\.js$"; then
          echo "❌ ERROR: Stale compiled .js files detected in src/components/"
          echo "Only TypeScript (.ts) source files should be committed."
          echo "Delete the .js files and let the build system regenerate them."
          exit 1
        fi
      fail_text: "Stale compiled JavaScript files detected. Remove them before committing."

    lint:
      run: npx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
      glob: "**/*.{ts,tsx,js,jsx,json}"

# Pre-push hooks - run before pushing to remote
pre-push:
  parallel: false
  commands:
    # Run tests for all packages
    test:
      run: npm run test
      fail_text: "Tests failed. Please fix the failing tests before pushing."

    # Run lint check (only fail on actual errors, not style warnings)
    lint-check:
      run: npm run lint:errors --silent
      fail_text: "Critical linting errors found. Please fix actual errors before pushing."

    # Type check with TypeScript compiler
    typecheck:
      run: npm run build:shared
      fail_text: "Type checking failed. Please fix TypeScript errors before pushing."
